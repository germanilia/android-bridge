name: Build latest artifacts

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: latest-artifacts
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build macOS application bundle
        env:
          NO_INSTALL: "1"
        run: mac/scripts/make-macos-app.sh

      - name: Build Android APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Package artifacts and checksums
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            mac/dist/AndroidBridge.app AndroidBridge-macOS-arm64.zip
          cp android/app/build/outputs/apk/debug/app-debug.apk AndroidBridge-latest.apk
          shasum -a 256 AndroidBridge-macOS-arm64.zip \
            > AndroidBridge-macOS-arm64.zip.sha256
          shasum -a 256 AndroidBridge-latest.apk \
            > AndroidBridge-latest.apk.sha256

      - name: Publish rolling latest release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          assets=(
            AndroidBridge-macOS-arm64.zip
            AndroidBridge-macOS-arm64.zip.sha256
            AndroidBridge-latest.apk
            AndroidBridge-latest.apk.sha256
          )
          if gh release view latest-build --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest-build "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit latest-build --repo "$GITHUB_REPOSITORY" \
              --title "Android Bridge latest build" \
              --notes "Automated build from main at $GITHUB_SHA."
          else
            gh release create latest-build "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Android Bridge latest build" \
              --notes "Automated build from main at $GITHUB_SHA." \
              --prerelease
          fi
