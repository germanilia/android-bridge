name: Build latest artifacts

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: latest-artifacts
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Import stable macOS signing identity
        env:
          SIGNING_P12: ${{ secrets.MACOS_SIGNING_P12 }}
          SIGNING_PASSWORD: ${{ secrets.MACOS_SIGNING_PASSWORD }}
        shell: bash
        run: |
          KEYCHAIN="$RUNNER_TEMP/android-bridge-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          printf '%s' "$SIGNING_P12" | base64 --decode > "$RUNNER_TEMP/signing.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/signing.p12" -k "$KEYCHAIN" \
            -P "$SIGNING_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

      - name: Build macOS application bundle
        env:
          NO_INSTALL: "1"
          CODESIGN_IDENTITY: "Android Bridge Distribution"
        run: mac/scripts/make-macos-app.sh

      - name: Build Android APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Package artifacts and checksums
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            mac/dist/AndroidBridge.app AndroidBridge-macOS-arm64.zip
          cp android/app/build/outputs/apk/debug/app-debug.apk AndroidBridge-latest.apk
          shasum -a 256 AndroidBridge-macOS-arm64.zip \
            > AndroidBridge-macOS-arm64.zip.sha256
          shasum -a 256 AndroidBridge-latest.apk \
            > AndroidBridge-latest.apk.sha256

      - name: Publish rolling latest release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          assets=(
            AndroidBridge-macOS-arm64.zip
            AndroidBridge-macOS-arm64.zip.sha256
            AndroidBridge-latest.apk
            AndroidBridge-latest.apk.sha256
          )
          if gh release view latest-build --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest-build "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit latest-build --repo "$GITHUB_REPOSITORY" \
              --title "Android Bridge latest build" \
              --notes "Automated build from main at $GITHUB_SHA."
          else
            gh release create latest-build "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Android Bridge latest build" \
              --notes "Automated build from main at $GITHUB_SHA." \
              --prerelease
          fi
